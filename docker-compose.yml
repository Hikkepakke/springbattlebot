version: "3.8"

services:
  bot:
    container_name: springbattlebot-bot
    build: bot
    image: bot
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./bot:/app
      # Keep Linux deps from the image; the bind mount above would hide them otherwise.
      - bot_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env

  database:
    container_name: springbattlebot-db
    image: postgres:14.1
    expose:
      - 5432
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d database -U username"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

volumes:
  bot_node_modules:
